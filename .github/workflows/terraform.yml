name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - 'providers/**'
      - 'bootstrap/**'
  push:
    branches: [main]
    paths:
      - 'providers/**'

jobs:
  terraform:
    name: Terraform / ${{ matrix.project }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        project:
          - providers/gcp/projects/my-project

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init
        working-directory: ${{ matrix.project }}
        run: terraform init -reconfigure

      - name: Terraform Format Check
        working-directory: ${{ matrix.project }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ matrix.project }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        if: github.event_name == 'pull_request'
        working-directory: ${{ matrix.project }}
        run: |
          terraform plan -no-color -input=false 2>&1 | tee plan_output.txt
          echo "plan_output<<EOF" >> $GITHUB_OUTPUT
          cat plan_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post Plan Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const project = '${{ matrix.project }}';
            const planOutput = `${{ steps.plan.outputs.plan_output }}`;
            const planStatus = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';
            const body = [
              `### ${planStatus} Terraform Plan: \`${project}\``,
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```terraform',
              planOutput,
              '```',
              '',
              '</details>'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ matrix.project }}
        run: terraform apply -auto-approve -input=false
