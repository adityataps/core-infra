name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - 'providers/**'
      - 'bootstrap/**'

jobs:
  terraform:
    name: Terraform / ${{ matrix.project }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        project:
          - providers/pagerduty
          - providers/gcp/org
          - providers/gcp/projects/management/tapshalkar-com
          - providers/gcp/projects/personal/tapshalkar-com-sandbox
          - providers/gcp/projects/personal/tapshalkar-com-personal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init
        working-directory: ${{ matrix.project }}
        run: terraform init -backend-config="bucket=tapshalkar-com-tfstate" -reconfigure

      - name: Terraform Format Check
        working-directory: ${{ matrix.project }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ matrix.project }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ matrix.project }}
        run: |
          terraform plan -no-color -input=false 2>&1 | tee plan_output.txt
          echo "plan_output<<EOF" >> $GITHUB_OUTPUT
          cat plan_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post Plan Comment
        uses: actions/github-script@v7
        with:
          script: |
            const project = '${{ matrix.project }}';
            const planOutput = `${{ steps.plan.outputs.plan_output }}`.trim();
            const planStatus = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';

            if (!planOutput) {
              console.log('No plan output captured, skipping comment.');
              return;
            }

            const maxLength = 60000;
            const truncated = planOutput.length > maxLength
              ? planOutput.substring(0, maxLength) + '\n\n... output truncated (exceeded 60,000 chars)'
              : planOutput;

            const body = [
              `### ${planStatus} Terraform Plan: \`${project}\``,
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```terraform',
              truncated,
              '```',
              '',
              '</details>'
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
